name: ThreatScope CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (ruff)
        run: ruff check . --ignore E501 --ignore F401 --ignore F811
        continue-on-error: true

      - name: Run unit tests
        run: |
          pytest tests/ -v --ignore=tests/test_parser.py \
            --ignore=tests/test_features.py \
            --ignore=tests/test_anomaly_model.py \
            --ignore=tests/test_ids_engine.py \
            --ignore=tests/test_ips_engine.py \
            --ignore=tests/test_mitre_enricher.py \
            --tb=short
        continue-on-error: true

      - name: Verify core imports
        run: |
          python -c "from config.settings import settings; print('Config OK:', settings.VERSION)"
          python -c "import structlog, rich, sklearn, elasticsearch; print('Dependencies OK')"
        env:
          ES_HOST: localhost
          IPS_DRY_RUN: "true"
