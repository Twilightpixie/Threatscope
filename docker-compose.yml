version: "3.8"

# ─── ThreatScope Full Stack ────────────────────────────────────────────────────
# Start everything:   docker-compose up -d
# Batch mode only:    docker-compose run --rm threatscope
# Streaming mode:     docker-compose run --rm threatscope python threatscope.py --stream
# Kibana dashboard:   http://localhost:5601
# Elasticsearch:      http://localhost:9200

services:

  # ── Zookeeper (Kafka dependency) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ts_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Kafka ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ts_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Elasticsearch ─────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    container_name: ts_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # disable auth for local dev
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=threatscope-cluster
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Kibana ────────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.1
    container_name: ts_kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      KIBANA_SYSTEM_PASSWORD: ""
    restart: unless-stopped

  # ── ThreatScope (batch mode by default) ───────────────────────────────────────
  threatscope:
    build: .
    container_name: ts_engine
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ES_HOST: elasticsearch
      ES_PORT: 9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: threatscope-logs
      LOG_PATH: /app/logs/network.log
      IPS_DRY_RUN: "true"
    volumes:
      - ./logs:/app/logs          # mount your log files here
      - ./models:/app/models      # persist trained ML models
    restart: on-failure

  # ── ThreatScope Streaming Worker (runs alongside batch) ───────────────────────
  threatscope-stream:
    build: .
    container_name: ts_stream
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: ["python", "threatscope.py", "--stream"]
    environment:
      ES_HOST: elasticsearch
      ES_PORT: 9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: threatscope-logs
      IPS_DRY_RUN: "true"
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    profiles:
      - streaming          # only starts with: docker-compose --profile streaming up

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  esdata:
  kafka_data:
  zookeeper_data:
