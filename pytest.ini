[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -v
    --cov=.
    --cov-report=term-missing
    --cov-omit=venv/*,tests/*,setup.py

markers =
    slow: marks tests as slow (run with -m slow)
    integration: marks tests requiring live Elasticsearch/Kafka
