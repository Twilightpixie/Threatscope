<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreatScope - Alert Triage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .card { background: #18181b; border: 1px solid #3f3f46; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col">
      <div class="flex items-center gap-3 mb-12">
        <i class="fas fa-shield-alt text-4xl text-violet-500"></i>
        <div>
          <div class="text-3xl font-bold">ThreatScope</div>
          <div class="text-xs text-zinc-500">Sristi Ghosh • SVU</div>
        </div>
      </div>
      <nav class="space-y-2 flex-1">
        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-zinc-800 rounded-2xl text-white font-medium">
          <i class="fas fa-exclamation-triangle"></i> Alert Triage
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-2xl text-zinc-400">
          <i class="fas fa-link"></i> Correlation Engine
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-800 rounded-2xl text-zinc-400">
          <i class="fas fa-crosshairs"></i> MITRE ATT&CK
        </a>
      </nav>
      <div class="text-xs text-zinc-500 mt-auto">
        Swami Vivekananda University<br>
        Dissertation Project 2026
      </div>
    </div>

    <!-- Main -->
    <div class="flex-1 p-10 overflow-auto">
      <h1 class="text-5xl font-bold mb-2">Alert Triage</h1>
      <p class="text-zinc-500 mb-10">Real-time Security Operations Center</p>

      <!-- KPI Cards -->
      <div class="grid grid-cols-4 gap-6 mb-12">
        <div class="card rounded-3xl p-8">
          <div class="text-6xl font-semibold">47</div>
          <div class="text-zinc-400 mt-2">Active Alerts</div>
        </div>
        <div class="card rounded-3xl p-8">
          <div class="text-6xl font-semibold text-red-400">5</div>
          <div class="text-zinc-400 mt-2">Critical</div>
        </div>
        <div class="card rounded-3xl p-8">
          <div class="text-6xl font-semibold">89%</div>
          <div class="text-zinc-400 mt-2">Triaged Today</div>
        </div>
        <div class="card rounded-3xl p-8">
          <div class="text-6xl font-semibold text-violet-400">94</div>
          <div class="text-zinc-400 mt-2">Avg Risk Score</div>
        </div>
      </div>

      <div class="grid grid-cols-12 gap-6">
        <!-- Severity Chart -->
        <div class="col-span-5 card rounded-3xl p-8">
          <h3 class="text-xl mb-6">Alerts by Severity</h3>
          <canvas id="severityChart" class="h-80"></canvas>
        </div>

        <!-- Recent Alerts -->
        <div class="col-span-7 card rounded-3xl p-8">
          <h3 class="text-xl mb-6">Recent Alerts</h3>
          <div id="alertsList" class="space-y-4">
            <!-- JS will fill this -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function loadAlerts() {
      try {
        const res = await fetch('http://localhost:8000/alerts');
        const data = await res.json();
        const alerts = data.alerts || [];

        const list = document.getElementById('alertsList');
        list.innerHTML = alerts.map(a => `
          <div class="bg-zinc-950 p-6 rounded-2xl border border-zinc-800 flex justify-between">
            <div>
              <div class="font-medium">${a.name}</div>
              <div class="text-xs text-zinc-500">${a.owner}</div>
            </div>
            <div class="${a.severity === 'High' ? 'text-red-400' : 'text-yellow-400'} font-medium">${a.severity}</div>
          </div>
        `).join('');

        // Chart
        const high = alerts.filter(a => a.severity === 'High').length || 14;
        const medium = alerts.filter(a => a.severity === 'Medium').length || 27;
        const low = alerts.filter(a => a.severity === 'Low').length || 19;

        new Chart(document.getElementById('severityChart'), {
          type: 'doughnut',
          data: {
            labels: ['High', 'Medium', 'Low'],
            datasets: [{
              data: [high, medium, low],
              backgroundColor: ['#ef4444', '#eab308', '#22c55e']
            }]
          },
          options: { cutout: '75%', plugins: { legend: { position: 'bottom' } } }
        });
      } catch(e) {
        console.log("Using mock data");
      }
    }

    loadAlerts();
  </script>
</body>
</html>
